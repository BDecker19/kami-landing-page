<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password reset | Kami</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #050814;
      --text: #f7f3ff;
      --muted: #a9b0c8;
      --purple: #7c4dff;
      --blue: #4b7cff;
      --line: rgba(255, 255, 255, 0.1);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 8%, rgba(104, 75, 255, 0.24), transparent 34%),
        radial-gradient(circle at 12% 25%, rgba(36, 107, 255, 0.12), transparent 24%),
        linear-gradient(180deg, #040711 0%, #071020 48%, #050814 100%);
      display: grid;
      place-items: center;
      padding: 28px 20px;
    }
    .card {
      width: min(440px, 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(19, 25, 48, 0.92), rgba(10, 15, 31, 0.92));
      box-shadow: var(--shadow);
      padding: 36px 28px 32px;
      text-align: center;
    }
    .logo {
      width: 56px;
      height: auto;
      margin: 0 auto 20px;
      display: block;
      filter: drop-shadow(0 0 18px rgba(124, 77, 255, 0.35));
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }
    .spinner {
      width: 36px;
      height: 36px;
      margin: 22px auto 0;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.12);
      border-top-color: var(--purple);
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="./assets/favicon.svg" alt="" width="56" height="56" />
    <div id="state-handoff">
      <h1>Opening Kami…</h1>
      <p>Finishing your password reset in the app.</p>
      <div class="spinner" aria-hidden="true"></div>
    </div>
    <div id="state-fallback" hidden>
      <h1>Continue on your phone</h1>
      <p>Open Kami on your phone to finish resetting your password.</p>
    </div>
    <div id="state-no-recovery" hidden>
      <h1>Password reset</h1>
      <p>Use the reset link from your email on the device where Kami is installed.</p>
    </div>
  </main>
  <script>
    (function () {
      var HANDOFF_MS = 2600;
      var CLEAN_PATH = "/password-reset";

      function paramsFromSegment(segment) {
        if (!segment || segment.length < 2) return new URLSearchParams();
        return new URLSearchParams(segment.charAt(0) === "#" || segment.charAt(0) === "?" ? segment.slice(1) : segment);
      }

      function isRecoveryPayload(params) {
        return (
          params.get("type") === "recovery" &&
          !!params.get("access_token") &&
          !!params.get("refresh_token")
        );
      }

      /** @returns {"hash" | "query" | null} */
      function recoveryPayloadSource() {
        if (isRecoveryPayload(paramsFromSegment(window.location.hash))) return "hash";
        if (isRecoveryPayload(paramsFromSegment(window.location.search))) return "query";
        return null;
      }

      function buildAppHandoffUrl(source) {
        if (source === "hash") return "kami://password-reset" + window.location.hash;
        if (source === "query") return "kami://password-reset" + window.location.search;
        return null;
      }

      function stripSensitiveFromAddressBar() {
        try {
          history.replaceState(null, "", CLEAN_PATH);
        } catch (_err) {
          /* ignore */
        }
      }

      function showHandoff() {
        document.getElementById("state-handoff").hidden = false;
        document.getElementById("state-fallback").hidden = true;
        document.getElementById("state-no-recovery").hidden = true;
      }

      function showFallback() {
        document.getElementById("state-handoff").hidden = true;
        document.getElementById("state-fallback").hidden = false;
        document.getElementById("state-no-recovery").hidden = true;
        stripSensitiveFromAddressBar();
      }

      function showNoRecovery() {
        document.getElementById("state-handoff").hidden = true;
        document.getElementById("state-fallback").hidden = true;
        document.getElementById("state-no-recovery").hidden = false;
        if (window.location.hash || window.location.search) stripSensitiveFromAddressBar();
      }

      function attemptHandoff(appUrl) {
        var canceled = false;
        function markLeft() {
          if (document.visibilityState === "hidden") canceled = true;
        }
        document.addEventListener("visibilitychange", markLeft);
        window.addEventListener("pagehide", markLeft);

        try {
          window.location.href = appUrl;
        } catch (_err) {
          /* ignore */
        }

        window.setTimeout(function () {
          document.removeEventListener("visibilitychange", markLeft);
          window.removeEventListener("pagehide", markLeft);
          if (canceled) return;
          if (document.visibilityState === "visible") showFallback();
        }, HANDOFF_MS);
      }

      function run() {
        var source = recoveryPayloadSource();
        var appUrl = buildAppHandoffUrl(source);
        if (!appUrl) {
          showNoRecovery();
          return;
        }
        showHandoff();
        attemptHandoff(appUrl);
      }

      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", run);
      else run();
    })();
  </script>
</body>
</html>
