<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Kami Investor Deck</title>
  <link rel="icon" href="../assets/k-mark-transparent.png" type="image/png" sizes="any" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    .loader {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      transition: opacity 0.35s ease;
    }
    .loader.is-hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-top-color: rgba(255, 255, 255, 0.65);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .deck {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
    }
    .deck iframe {
      display: block;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border: none;
    }
  </style>
</head>
<body>
  <div class="loader" id="loader" aria-hidden="true">
    <div class="spinner"></div>
  </div>
  <div class="deck">
    <iframe
      id="deck"
      src="https://www.canva.com/design/DAHLuZfF4LE/9eU38rFFWEw9bW50BWuxfg/view?embed"
      allow="fullscreen"
      allowfullscreen
      loading="eager"
      title="Kami Investor Deck"
    ></iframe>
  </div>
  <script>
    (function () {
      var iframe = document.getElementById("deck");
      var loader = document.getElementById("loader");
      var done = false;

      function hideLoader() {
        if (done) return;
        done = true;
        loader.classList.add("is-hidden");
        window.setTimeout(function () {
          if (loader.parentNode) loader.parentNode.removeChild(loader);
        }, 400);
      }

      iframe.addEventListener("load", hideLoader);
      window.setTimeout(hideLoader, 8000);
    })();
  </script>
</body>
</html>
